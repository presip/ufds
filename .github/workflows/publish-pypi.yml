name: Publish PyPI package

# Triggered by tags like `py-v0.1.0` (scoped to the Python SDK, since this
# repo also ships a JavaScript SDK tagged separately as `js-vX.Y.Z`).
#
# Uses PyPI's trusted publishing (OIDC) — no API token needed — but the
# ufds-sdk PyPI project must first register this repo + workflow file as a
# trusted publisher (one-time setup at https://pypi.org/manage/project/ufds-sdk/settings/publishing/).
on:
  push:
    tags:
      - 'py-v*'

permissions:
  contents: read
  id-token: write # required for PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#py-v}"
          PKG_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag py-v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install package with test extras
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
