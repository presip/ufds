name: Publish npm package

# Triggered by tags like `js-v0.1.0` (scoped to the JavaScript SDK, since this
# repo also ships a Python SDK tagged separately as `py-vX.Y.Z`).
on:
  push:
    tags:
      - 'js-v*'

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#js-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag js-v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build (ESM + CJS)
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Requires an npm automation token stored as the NPM_TOKEN repo secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
